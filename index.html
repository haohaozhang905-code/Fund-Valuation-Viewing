<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FinMate - 持仓看板</title>
<style>
/* ===== Variables ===== */
:root {
  --bg:#111113; --bg2:#1A1A1E; --bg3:#252529; --bg4:#2E2E32;
  --border:rgba(255,255,255,.07); --text:#EEE; --text2:#888; --text3:#555;
  --blue:#3B82F6; --green:#00A63E; --red:#FF0005; --orange:#F59E0B;
  --radius:10px; --shadow:0 1px 3px rgba(0,0,0,.3);
  --font:"PingFang SC",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  --sidebar-w:200px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
input,button,select,textarea{font-family:inherit;font-size:inherit;outline:none;border:none;background:none;color:inherit}
button{cursor:pointer}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
a{color:var(--blue);text-decoration:none}

/* ===== Layout ===== */
#app{display:flex;height:100vh}
.sidebar{width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sidebar .logo{padding:20px 18px 16px;font-size:18px;font-weight:700;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
.sidebar .logo span{background:linear-gradient(135deg,var(--blue),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sidebar-nav{flex:1;padding:4px 8px;display:flex;flex-direction:column;gap:2px}
.sidebar-nav a{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius);color:var(--text2);font-size:13px;font-weight:500;transition:all .15s;cursor:pointer;text-decoration:none}
.sidebar-nav a:hover{background:var(--bg3);color:var(--text)}
.sidebar-nav a.active{background:var(--blue);color:#fff}
.sidebar-nav a .ico{font-size:16px;width:20px;text-align:center}
.sidebar-footer{padding:8px;border-top:1px solid var(--border)}
.sidebar-footer a{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius);color:var(--text2);font-size:13px;cursor:pointer;transition:all .15s}
.sidebar-footer a:hover{background:var(--bg3);color:var(--red)}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ===== Top Bar ===== */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-bottom:1px solid var(--border);flex-shrink:0;gap:16px}
.topbar h2{font-size:16px;font-weight:600}
.topbar-actions{display:flex;align-items:center;gap:8px}
.topbar-actions button{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:16px;transition:all .15s}
.topbar-actions button:hover{background:var(--bg3);color:var(--text)}
.topbar .user-badge{font-size:12px;color:var(--text2);padding:4px 10px;background:var(--bg3);border-radius:20px}
.topbar .top-login-btn{width:auto;height:auto;background:linear-gradient(135deg,var(--blue),#6366F1);color:#fff;padding:8px 20px;border-radius:24px;font-size:13px;font-weight:500;border:none;cursor:pointer;transition:all .2s;margin-left:8px;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;line-height:1.4}
.topbar .top-login-btn:hover{opacity:.92;transform:translateY(-1px);box-shadow:0 4px 16px rgba(59,130,246,.35)}
.topbar .top-login-btn:active{transform:translateY(0);opacity:.88}

/* ===== Page Content ===== */
.page-content{flex:1;overflow-y:auto;padding:20px 24px}

/* ===== Summary Cards ===== */
.summary-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:16px}
.summary-card{background:var(--bg2);border-radius:var(--radius);padding:16px 18px;border:1px solid var(--border)}
.summary-card .sc-label{font-size:12px;color:var(--text2);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.summary-card .sc-label .dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.summary-card .sc-value{font-size:22px;font-weight:700}
.summary-card .sc-sub{font-size:12px;margin-top:2px;font-weight:500}
.summary-card .sc-sub.green{color:var(--green)}.summary-card .sc-sub.red{color:var(--red)}

/* ===== Section Tabs ===== */
.section-tabs{display:flex;gap:2px;background:var(--bg3);border-radius:var(--radius);padding:2px;width:fit-content;margin-bottom:16px}
.section-tabs .st-btn{padding:7px 18px;border-radius:8px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;border:none}
.section-tabs .st-btn.active{background:var(--blue);color:#fff}
.section-tabs .st-btn:hover:not(.active){color:var(--text)}

/* ===== Data Table ===== */
.table-wrap{background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.table-wrap .tw-toolbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)}
.table-wrap .tw-toolbar .tw-title{font-size:13px;font-weight:600;color:var(--text2)}
.table-wrap .tw-toolbar .tw-actions{display:flex;gap:6px}
table.data-table{width:100%;border-collapse:collapse;font-size:13px}
table.data-table th{text-align:left;padding:10px 14px;font-weight:600;color:var(--text2);font-size:12px;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;transition:color .15s}
table.data-table th:hover{color:var(--text)}
table.data-table th .sort-arrow{font-size:10px;margin-left:3px;opacity:0;transition:opacity .15s}
table.data-table th:hover .sort-arrow,table.data-table th.sorted .sort-arrow{opacity:1}
table.data-table th.sorted{color:var(--blue)}
table.data-table td{padding:12px 14px;border-bottom:1px solid var(--border);transition:background .1s}
table.data-table tr:last-child td{border-bottom:none}
table.data-table tr:hover td{background:var(--bg3)}
table.data-table tr{cursor:pointer}
table.data-table .td-name{font-weight:500;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
table.data-table .td-code{font-size:11px;color:var(--text3);font-family:monospace}
table.data-table .td-num{font-family:monospace;text-align:right;font-weight:500}
table.data-table .td-up{color:var(--red)}table.data-table .td-down{color:var(--green)}
table.data-table .empty-msg{padding:40px;text-align:center;color:var(--text2)}

/* ===== Asset Card ===== */
.asset-card{background:var(--bg2);border-radius:var(--radius);padding:16px 20px 11px;border:1px solid var(--border)}
.asset-card .ac-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.asset-card .ac-title{font-size:10px;letter-spacing:.11em;color:rgba(255,255,255,.45)}
.ac-pill{font-size:10px;font-weight:600;padding:3px 7px;border-radius:6px;background:rgba(28,57,142,.75);color:#DBEAFE}
.asset-card .ac-amount{font-size:17px;font-weight:700;color:#fff;margin-bottom:10px}
.asset-card .ac-split{display:grid;grid-template-columns:1fr 1fr;gap:0;border-top:1px solid var(--border);padding-top:10px}
.asset-card .ac-split .acs-label{font-size:10px;letter-spacing:.11em;color:rgba(255,255,255,.4);margin-bottom:2px}
.asset-card .ac-split .acs-val{font-size:17px;font-weight:700}
.asset-card .ac-split .acs-pct{font-size:12px;font-weight:400}
.asset-card .ac-time{font-size:10px;color:rgba(161,161,161,.5);margin-top:8px}
.ac-date-suffix{display:inline-block;font-size:10px;font-weight:600;color:#34D399;padding:2px 6px;background:rgba(6,78,59,.8);border-radius:6px;margin-left:6px;vertical-align:middle}

/* ===== Slide Panel ===== */
.slide-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:100;opacity:0;transition:opacity .25s;pointer-events:none}
.slide-overlay.open{opacity:1;pointer-events:auto}
.slide-panel{position:fixed;top:0;right:0;bottom:0;width:520px;max-width:92vw;background:var(--bg2);z-index:101;transform:translateX(100%);transition:transform .3s cubic-bezier(.22,1,.36,1);display:flex;flex-direction:column;box-shadow:-4px 0 24px rgba(0,0,0,.4)}
.slide-panel.open{transform:translateX(0)}
.slide-panel .sp-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.slide-panel .sp-header h3{font-size:16px;font-weight:600}
.slide-panel .sp-header .sp-close{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:18px;transition:all .15s}
.slide-panel .sp-header .sp-close:hover{background:var(--bg3);color:var(--text)}
.slide-panel .sp-body{flex:1;overflow-y:auto;padding:20px}
.slide-panel .sp-footer{padding:16px 20px;border-top:1px solid var(--border);flex-shrink:0;display:flex;gap:8px;justify-content:flex-end}

/* ===== Detail Content in Slide ===== */
.detail-big{text-align:center;padding:16px 0 20px}
.detail-big .db-code{font-size:12px;color:var(--text2);margin-bottom:2px}
.detail-big .db-name{font-size:18px;font-weight:600;margin-bottom:8px}
.detail-big .db-price{font-size:32px;font-weight:700;margin-bottom:2px}
.detail-big .db-change{font-size:14px;font-weight:500}
.detail-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px}
.detail-grid .dg-item{background:var(--bg);padding:10px 14px}
.detail-grid .dg-item .dg-label{font-size:11px;color:var(--text2);margin-bottom:2px}
.detail-grid .dg-item .dg-value{font-size:14px;font-weight:600}
.detail-grid .dg-item .dg-value.green{color:var(--green)}.detail-grid .dg-item .dg-value.red{color:var(--red)}
.detail-section-title{font-size:13px;font-weight:600;margin:16px 0 8px;color:var(--text2)}
.detail-info{font-size:12px;line-height:1.8}
.detail-info .di-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border)}.detail-info .di-row:last-child{border:none}
.detail-info .di-label{color:var(--text2)}.detail-info .di-value{font-family:monospace}

.chart-wrap{background:var(--bg);border-radius:var(--radius);padding:8px;height:280px;margin-bottom:8px}
.chart-wrap canvas{width:100%;height:100%;display:block}
.chart-tabs{display:flex;gap:3px;margin-bottom:8px;flex-wrap:wrap}
.chart-tabs .ct-btn{padding:4px 12px;font-size:11px;border-radius:6px;background:var(--bg3);color:var(--text2);cursor:pointer;transition:all .12s;border:none}
.chart-tabs .ct-btn.active{background:var(--blue);color:#fff}
.chart-tabs .ct-btn:hover:not(.active){color:var(--text)}
.pill{display:inline-block;font-size:10px;padding:2px 6px;border-radius:4px;background:var(--bg3);color:var(--text2);margin-left:6px;vertical-align:middle}
.kline-legend{display:flex;gap:16px;padding:0 0 8px;font-size:11px}
.kline-legend .kl-item{display:flex;align-items:center;gap:4px}
.kline-legend .kl-dot{width:8px;height:8px;border-radius:2px}
.detail-info-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.detail-info-row:last-child{border:none}
.detail-info-row .dir-label{color:var(--text2)}
.detail-info-row .dir-value{font-family:monospace;font-weight:500}

/* ===== Slide Editor ===== */
.form-group{margin-bottom:14px}
.form-group label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px}
.form-group input, .form-group select{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-size:14px;color:var(--text);transition:border-color .15s}
.form-group input:focus{border-color:var(--blue)}
.form-group input[readonly]{color:var(--text2);cursor:default}
.form-row{display:flex;gap:12px}
.form-row .form-group{flex:1}

/* ===== Buttons ===== */
.btn{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:500;transition:all .12s;border:none;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{opacity:.85}
.btn-secondary{background:var(--bg3);color:var(--text)}
.btn-secondary:hover{background:var(--bg4)}
.btn-danger{background:rgba(239,68,68,.12);color:var(--red)}
.btn-danger:hover{background:rgba(239,68,68,.2)}
.btn-ghost{color:var(--text2);padding:8px 12px}
.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-success{background:var(--green);color:#fff}
.btn-success:hover{opacity:.85}
.btn-sm{padding:5px 12px;font-size:12px}

/* ===== Auth Pages ===== */
.auth-page{display:flex;align-items:center;justify-content:center;width:100%;height:100%;padding:32px 16px;background:radial-gradient(ellipse at 50% 30%,rgba(59,130,246,.04) 0%,transparent 60%)}
.auth-card{width:100%;max-width:400px;background:var(--bg2);border-radius:16px;padding:40px 36px;border:1px solid var(--border);box-shadow:0 8px 32px rgba(0,0,0,.25);position:relative;overflow:hidden}
.auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--blue),#6366F1,var(--green))}
.auth-card h2{font-size:24px;font-weight:700;text-align:center;margin-bottom:2px;color:var(--text)}
.auth-card .auth-sub{text-align:center;font-size:14px;color:var(--text2);margin-bottom:32px;letter-spacing:0.3px}
.auth-error{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:var(--red);padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none}
.auth-error.show{display:block}
.auth-link{text-align:center;font-size:13px;color:var(--text2);margin-top:20px}
.auth-link a{color:var(--blue);font-weight:500}
.auth-card .form-group{margin-bottom:18px}
.auth-card .form-group label{font-size:12px;color:var(--text2);display:block;margin-bottom:6px;font-weight:500;letter-spacing:0.3px}
.auth-card .form-group input{width:100%;padding:12px 14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;font-size:14px;color:var(--text);transition:border-color .2s,box-shadow .2s}
.auth-card .form-group input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.12)}
.auth-card .btn{padding:11px 18px;border-radius:10px;font-size:14px;font-weight:600;width:100%}
.auth-card .btn-primary{background:linear-gradient(135deg,var(--blue),#6366F1);color:#fff}
.auth-card .btn-primary:hover{opacity:.92;transform:translateY(-1px);box-shadow:0 6px 20px rgba(59,130,246,.3)}

/* ===== Settings Page ===== */
.settings-section{background:var(--bg2);border-radius:var(--radius);padding:20px 24px;border:1px solid var(--border);margin-bottom:14px}
.settings-section h3{font-size:14px;font-weight:600;margin-bottom:14px;color:var(--text);display:flex;align-items:center;gap:8px}
.settings-section h3::before{content:'';width:3px;height:14px;background:var(--blue);border-radius:2px}
.settings-row{display:flex;align-items:center;padding:10px 12px;border-radius:8px;background:var(--bg);margin-bottom:3px;gap:10px}
.settings-row .sl-label{font-size:13px;color:var(--text2);width:72px;flex-shrink:0}
.settings-row .sl-value{font-size:13px;font-weight:500}
.settings-actions{display:flex;gap:8px;margin-top:4px}

/* ===== AI Page ===== */
.ai-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.ai-report{background:var(--bg2);border-radius:var(--radius);padding:20px;border:1px solid var(--border);line-height:1.8;font-size:13px}
.ai-report h1,.ai-report h2,.ai-report h3{font-weight:600;margin:14px 0 6px}
.ai-report ul,.ai-report ol{padding-left:18px;margin-bottom:6px}
.ai-report li{margin-bottom:3px}
.ai-report strong{font-weight:600}
.ai-loading{text-align:center;padding:40px;color:var(--text2)}
.ai-loading .spinner{display:inline-block;width:22px;height:22px;border:2px solid var(--bg3);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:10px}
.ai-empty{text-align:center;padding:40px;color:var(--text2);font-size:13px}
.ai-disclaimer{font-size:11px;color:var(--text3);margin-top:12px;padding:10px 14px;background:var(--bg3);border-radius:8px;line-height:1.5}

/* ===== Dashboard Loading Skeleton ===== */
.dash-loading{}
.dash-loading .sk-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.dash-loading .sk-card{background:var(--bg2);border-radius:var(--radius);padding:20px;border:1px solid var(--border);animation:skeleton-pulse 1.6s ease-in-out infinite}
.dash-loading .sk-card:nth-child(2){animation-delay:.15s}
.dash-loading .sk-card:nth-child(3){animation-delay:.3s}
.dash-loading .sk-card .sk-label{width:48px;height:10px;background:var(--bg4);border-radius:4px;margin-bottom:12px}
.dash-loading .sk-card .sk-big{width:70%;height:22px;background:var(--bg4);border-radius:6px;margin-bottom:10px}
.dash-loading .sk-card .sk-small{width:45%;height:12px;background:var(--bg4);border-radius:4px}
.dash-loading .sk-tabs{width:160px;height:32px;background:var(--bg3);border-radius:var(--radius);margin-bottom:16px;animation:skeleton-pulse 1.6s ease-in-out infinite}
.dash-loading .sk-table-wrap{background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);padding:56px 20px;text-align:center}
.dash-loading .sk-table-wrap .spinner{display:inline-block;width:26px;height:26px;border:2.5px solid var(--bg4);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:14px}
.dash-loading .sk-table-wrap p{color:var(--text2);font-size:13px;margin:0}
@keyframes skeleton-pulse{0%,100%{opacity:.35}50%{opacity:.65}}

/* ===== Toast ===== */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--bg3);padding:10px 20px;border-radius:var(--radius);font-size:13px;z-index:200;animation:fadeIn .2s;display:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.4);border:1px solid var(--border)}
.toast.show{display:block}.toast.success{border-color:var(--green)}.toast.error{border-color:var(--red)}

/* ===== Context Menu ===== */
.ctx-menu{position:fixed;z-index:150;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:4px;min-width:140px;box-shadow:0 4px 20px rgba(0,0,0,.5);animation:fadeIn .12s}
.ctx-menu .ctx-item{display:flex;align-items:center;gap:8px;padding:7px 12px;font-size:13px;border-radius:6px;cursor:pointer;transition:background .1s}
.ctx-menu .ctx-item:hover{background:var(--bg3)}
.ctx-menu .ctx-item.danger{color:var(--red)}
.ctx-menu .ctx-divider{height:1px;background:var(--border);margin:4px 0}

/* ===== Animations ===== */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ===== Responsive ===== */
@media(max-width:768px){
  .sidebar{position:fixed;left:-200px;z-index:50;top:0;bottom:0;transition:left .25s;box-shadow:4px 0 20px rgba(0,0,0,.4)}
  .sidebar.open{left:0}
  .sidebar .logo{padding:16px}
  :root{--sidebar-w:200px}
  .summary-row{grid-template-columns:repeat(2,1fr)}
  .slide-panel{width:100vw;max-width:100vw}
  table.data-table{font-size:12px}
  table.data-table th,table.data-table td{padding:8px 10px}
  .table-wrap{overflow-x:auto}
  .topbar{padding:10px 16px}
  .page-content{padding:16px}
}

/* ===== Mobile sidebar toggle ===== */
.mobile-menu-btn{display:none}
@media(max-width:768px){
  .mobile-menu-btn{display:flex}
  .sidebar.closed{left:calc(-1 * var(--sidebar-w))}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ==========================================================================
   FinMate Web v2 — 桌面级投资看板
   ========================================================================== */

// ===== Config =====
const API_BASE = 'https://thsbridge.zeabur.app';
const TOKEN_KEY = 'auth_token_v1';
const CSRCACHE_KEY = 'fund_list_v1';
const STOCKCACHE_KEY = 'stock_list_v1';
const AICONFIG_KEY = 'ai_config_v1';
const SAMPLE_FUNDS = [{id:'demo-fund-1',fundCode:'006479',fundName:'',costPrice:6.4994,shares:3000}];
const SAMPLE_STOCKS = [{id:'demo-stock-1',symbol:'MU',displayName:'',averageCost:776,shares:3}];
const FUND_REF_MS = 5*60*1000;
const STOCK_REF_MS = 60*1000;

// ===== Toast =====
function toast(msg, type) {
  let el = document.getElementById('toast-el');
  if (!el) { el = document.createElement('div'); el.id = 'toast-el'; el.className = 'toast'; document.body.appendChild(el); }
  el.textContent = msg; el.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(el._timer); el._timer = setTimeout(() => { el.className = 'toast'; }, 2500);
}

// ===== API =====
const api = {
  _token(){return localStorage.getItem(TOKEN_KEY)||''},
  _headers(e){const h={'Content-Type':'application/json',...e};const t=this._token();if(t)h.Authorization='Bearer '+t;return h},
  async _fetch(m,p,b){const o={method:m,headers:this._headers()};if(b)o.body=JSON.stringify(b);const r=await fetch(API_BASE+p,o);if(r.status===401&&p.startsWith('/v1/auth/')){}else if(r.status===401){localStorage.removeItem(TOKEN_KEY);navigate('login');throw Error('未登录')}
  if(!r.ok){let d;try{d=await r.json()}catch(e){d={detail:r.statusText}}throw Error(d.detail||'请求失败')}return r.json()},
  get(p){return this._fetch('GET',p)},
  post(p,b){return this._fetch('POST',p,b)},
  put(p,b){return this._fetch('PUT',p,b)},
  del(p){return this._fetch('DELETE',p)},
  login(e,p){return this.post('/v1/auth/login',{email:e,password:p})},
  register(e,p){return this.post('/v1/auth/register',{email:e,password:p})},
  requestReset(e){return this.post('/v1/auth/password-reset/request',{email:e})},
  confirmReset(e,c,np){return this.post('/v1/auth/password-reset/confirm',{email:e,code:c,newPassword:np})},
  me(){return this.get('/v1/auth/me')},
  deleteAccount(){return this.del('/v1/account')},
  getPortfolio(){return this.get('/v1/portfolio')},
  putPortfolio(p){return this.put('/v1/portfolio',p)},
  searchStocks(q){return this.get('/v1/stocks/search?q='+encodeURIComponent(q)+'&market=US')},
  stockQuote(s){return this.get('/v1/stocks/quote?symbol='+encodeURIComponent(s)+'&market=US')},
  stockKline(s,c){return this.get('/v1/stocks/kline?symbol='+encodeURIComponent(s)+'&count='+(c||120))},
  fundValuation(c){return this.get('/v1/funds/valuation/'+c)},
  fundNavTrend(c){return this.get('/v1/funds/nav-trend/'+c)},
  fundNavLatest(c){return this.get('/v1/funds/nav-latest/'+c)},
  csi300(d){return this.get('/v1/index/csi300?datalen='+(d||242))},
  async aiAnalyze(p,cfg){const h={'Content-Type':'application/json'};if(cfg.apiKey)h.Authorization='Bearer '+cfg.apiKey;const b={model:cfg.model||'qwen-plus',messages:[{role:'user',content:p}],stream:false};const r=await fetch(cfg.endpoint+'/compatible-mode/v1/chat/completions',{method:'POST',headers:h,body:JSON.stringify(b)});if(!r.ok){let d;try{d=await r.json()}catch(e){d={}}throw Error(d.message||d.error?.message||'AI请求失败')}const d=await r.json();return d.choices?.[0]?.message?.content||''}
};

// ===== Navigation =====
function navigate(page,params){
  state.page=page;
  const h=page+(params?'?'+new URLSearchParams(params).toString():'');
  if(window.location.hash!==('#'+h))window.location.hash=h;
  render();
}
function curParams(){
  const i=window.location.hash.indexOf('?');
  return i<0?{}:Object.fromEntries(new URLSearchParams(window.location.hash.slice(i+1)));
}

// ===== Utilities =====
function fmt(v,d){return v==null||isNaN(v)?(d||'-'):v}
function fmtM(v){if(v==null||isNaN(v))return'-';return(v>=0?'':'')+'¥'+Math.abs(v).toFixed(2)}
function fmtMP(v){return(v>=0?'+':'-')+fmtM(v).slice(1)}
function fmtD(v){if(v==null||isNaN(v))return'-';return(v>=0?'':'')+'$'+Math.abs(v).toFixed(2)}
function fmtDP(v){if(v==null||isNaN(v))return'-';return(v>=0?'+$':'-$')+Math.abs(v).toFixed(2)}
function fmtR(v){if(v==null||isNaN(v))return'-';return(v>=0?'+':'')+v.toFixed(2)+'%'}
function cc(v){return v>=0?'td-up':'td-down'}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function isMarketOpen(){const h=new Date().getHours(),d=new Date().getDay();return d>0&&d<6&&h>=9&&h<15}
function $(id){return document.getElementById(id)}

// Portofino price display
function priceCol(v){return v>0?'var(--red)':(v<0?'var(--green)':'var(--text2)')}
function requireAuth(action){
  if(!state.user){
    toast('请先登录以'+action,'error');
    setTimeout(()=>navigate('login'),400);
    return false;
  }
  return true;
}

function mergeNavPair(trend,latest){
  let nav=null,pNav=null,nDate=null;
  if(trend&&trend.length){const l=trend[trend.length-1];nav=l.y;nDate=new Date(l.x);if(trend.length>1)pNav=trend[trend.length-2].y}
  if(latest&&latest.length){const f=latest[0],fd=new Date(f.date.replace(/-/g,'/')),fn=parseFloat(f.nav);if(!nDate||fd>nDate||(fd.getTime()===nDate.getTime()&&fn!==nav)){nav=fn;nDate=fd;if(latest.length>1)pNav=parseFloat(latest[1].nav)}}
  return{nav,pNav,navDate:nDate?nDate.toISOString().split('T')[0]:null}
}

// ===== Portfolio =====
async function bootstrapPortfolio(){
  if(!state.user) return; // demo mode: skip API, sample data already set
  try{
    const r=await api.getPortfolio();
    const hasR=r.funds?.length>0||r.stocks?.length>0;
    const lf=JSON.parse(localStorage.getItem(CSRCACHE_KEY)||'[]'),ls=JSON.parse(localStorage.getItem(STOCKCACHE_KEY)||'[]');
    if(hasR){state.funds=(r.funds||[]).map(f=>({id:f.id,fundCode:f.fundCode,fundName:f.fundName,costPrice:f.costPrice,shares:f.shares}));state.stocks=(r.stocks||[]).map(s=>({id:s.id,symbol:s.symbol,displayName:s.displayName,averageCost:s.averageCost,shares:s.shares}))}
    else if(lf.length||ls.length){state.funds=lf;state.stocks=ls;await uploadPortfolio()}
    else{state.funds=[];state.stocks=[]}
    saveFunds();saveStocks();
  }catch(e){state.funds=JSON.parse(localStorage.getItem(CSRCACHE_KEY)||'[]');state.stocks=JSON.parse(localStorage.getItem(STOCKCACHE_KEY)||'[]')}
}

async function uploadPortfolio(){
  try{
    await api.putPortfolio({funds:state.funds.map(f=>({id:f.id,fundCode:f.fundCode,fundName:f.fundName,costPrice:f.costPrice,shares:f.shares,clientUpdatedAt:new Date().toISOString()})),stocks:state.stocks.map(s=>({id:s.id,symbol:s.symbol,displayName:s.displayName,averageCost:s.averageCost,shares:s.shares,clientUpdatedAt:new Date().toISOString()}))});
  }catch(e){}
}

// ===== Main Render =====
function render(){
  const app=document.getElementById('app');
  if(!state.user&&(state.page==='settings'||state.page==='ai')){navigate('login');return}
  if(['login','register','reset'].includes(state.page)){app.innerHTML=renderAuth();bindAuth();return}
  app.innerHTML=renderLayout();
  bindLayout();
  // render sub-page
  const c=document.getElementById('page-content');
  if(c){
    switch(state.page){
      case 'dashboard':c.innerHTML=renderDashboard();bindDashboard();break;
      case 'settings':c.innerHTML=renderSettings();bindSettings();break;
      case 'ai':c.innerHTML=renderAI();bindAI();break;
      default:c.innerHTML=renderDashboard();bindDashboard();
    }
  }
  // highlight sidebar
  document.querySelectorAll('.sidebar-nav a').forEach(a=>a.classList.toggle('active',a.dataset.page===state.page));
  // load chart data after detail panel opens
  if(state.page==='dashboard'&&$('slide-panel')?.classList.contains('open')){const p=curParams();if(p.view==='fund'&&p.code)loadFundDetail(p.code);if(p.view==='stock'&&p.symbol)loadStockDetail(p.symbol)}
}

function bindAuth(){
  const err=$('auth-error');
  function showE(m){if(err){err.textContent=m;err.classList.add('show')}}
  function hideE(){if(err)err.classList.remove('show')}

  $('auth-submit-btn')?.addEventListener('click',async()=>{
    if(state.page==='register'){const e=$('auth-email')?.value,p=$('auth-pwd')?.value,p2=$('auth-pwd2')?.value;if(!e||!p){showE('请填写完整');return}if(p!==p2){showE('密码不一致');return}if(p.length<8){showE('密码至少8位');return}hideE();const btn=$('auth-submit-btn');btn.disabled=true;btn.textContent='注册中…';try{const r=await api.register(e,p);localStorage.setItem(TOKEN_KEY,r.accessToken);state.user=r.user;state.demo=false;state.loading=true;btn.textContent='加载中…';navigate('dashboard');toast('注册成功','success');bootstrapPortfolio().finally(()=>loadDashboardData())}catch(ex){btn.disabled=false;btn.textContent='注册';showE(ex.message)}}
    else{const e=$('auth-email')?.value,p=$('auth-pwd')?.value;if(!e||!p){showE('请填写邮箱和密码');return}hideE();const btn=$('auth-submit-btn');btn.disabled=true;btn.textContent='登录中…';try{const r=await api.login(e,p);localStorage.setItem(TOKEN_KEY,r.accessToken);state.user=r.user;state.demo=false;state.loading=true;btn.textContent='加载看板…';navigate('dashboard');bootstrapPortfolio().finally(()=>loadDashboardData())}catch(ex){btn.disabled=false;btn.textContent='登录';showE(ex.message)}}
  });
  $('goto-reg')?.addEventListener('click',(e)=>{e.preventDefault();navigate('register')});
  $('goto-log')?.addEventListener('click',(e)=>{e.preventDefault();navigate('login')});
  $('goto-rst')?.addEventListener('click',(e)=>{e.preventDefault();navigate('reset')});
  $('rst-back-btn')?.addEventListener('click',()=>navigate('login'));
  $('rst-send-btn')?.addEventListener('click',async()=>{const e=$('rst-email')?.value;if(!e){showE('请填写邮箱');return}hideE();try{await api.requestReset(e);$('rst-step1').style.display='none';$('rst-step2').style.display='block';toast('验证码已发送','success')}catch(ex){showE(ex.message)}});
  $('rst-confirm-btn')?.addEventListener('click',async()=>{const e=$('rst-email')?.value,c=$('rst-code')?.value,np=$('rst-npwd')?.value;if(!c||!np){showE('请填写验证码和新密码');return}if(np.length<8){showE('密码至少8位');return}hideE();try{const r=await api.confirmReset(e,c,np);localStorage.setItem(TOKEN_KEY,r.accessToken);state.user=r.user;state.demo=false;state.loading=true;navigate('dashboard');toast('密码已重置','success');bootstrapPortfolio().finally(()=>loadDashboardData())}catch(ex){showE(ex.message)}});
  $('auth-pwd')?.addEventListener('keydown',e=>{if(e.key==='Enter'&&$('auth-submit-btn'))$('auth-submit-btn').click()});
}

// ===== Charts =====
const RANGES={d7:7,m1:21,m3:63,m6:126,y1:252,y3:756};
const SRANGES={d7:7,m1:20,m3:60,m6:120,y1:250,y3:750};
function drawPerfChart(range){
  const c=$('perf-chart');if(!c)return;
  const p=curParams(),code=p.code||'';
  const snap=state.fundSnapshots.find(s=>s.code===code);
  if(!snap)return;
  const rect=c.parentElement.getBoundingClientRect();
  c.width=rect.width*2;c.height=rect.height*2;
  const ctx=c.getContext('2d');ctx.scale(2,2);
  const W=rect.width,H=rect.height,pad={top:20,right:16,bottom:28,left:48},cw=W-pad.left-pad.right,ch=H-pad.top-pad.bottom;
  const trend=state._navTrendCache[code]||[],csi=state._csi300Cache||[];
  const days=RANGES[range]||63;
  // Build raw arrays — both series use the FIRST value in the sliced range as baseline
  const rawFundPts=trend.slice(-days).map(p=>({date:new Date(p.x),y:p.y}));
  if(rawFundPts.length){const b=rawFundPts[0].y;rawFundPts.forEach(p=>{p.cumRet=b>0?(p.y-b)/b*100:0})}
  const rawCsiPts=csi.slice(-days).map(p=>({date:new Date(p.date||p.day),value:parseFloat(p.close||p.price||0)}));
  if(rawCsiPts.length){const b=rawCsiPts[0].value;rawCsiPts.forEach(p=>{p.cumRet=b>0?(p.value-b)/b*100:0})}
  // Date-aligned merge (matches iOS behaviour: skip dates where either series is missing)
  const csiMap={};rawCsiPts.forEach(p=>{const d=p.date.toISOString().split('T')[0];csiMap[d]=p.cumRet});
  const merged=[];rawFundPts.forEach(p=>{const d=p.date.toISOString().split('T')[0];if(csiMap[d]!==undefined)merged.push({date:p.date,fundRet:p.cumRet,csiRet:csiMap[d]})});
  const fundPts=merged.map(m=>({date:m.date,cumRet:m.fundRet}));
  const csiPts=merged.map(m=>({date:m.date,cumRet:m.csiRet}));
  if(!fundPts.length&&!csiPts.length){ctx.fillStyle='#666';ctx.font='12px sans-serif';ctx.textAlign='center';ctx.fillText('暂无数据',W/2,H/2);return}
  const all=[...fundPts.map(p=>p.cumRet),...csiPts.map(p=>p.cumRet),0];
  const min=Math.min(...all),max=Math.max(...all),rng=max-min||1;
  const n=fundPts.length||csiPts.length;
  const tx=(i)=>pad.left+(i/(n-1||1))*cw,ty=v=>pad.top+ch-((v-min)/rng)*ch;
  ctx.clearRect(0,0,W,H);
  // grid
  ctx.strokeStyle='rgba(255,255,255,.05)';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){const y=pad.top+(ch/4)*i;ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(W-pad.right,y);ctx.stroke()}
  // zero line
  if(min<0&&max>0){const zy=ty(0);ctx.strokeStyle='rgba(255,255,255,.08)';ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(pad.left,zy);ctx.lineTo(W-pad.right,zy);ctx.stroke();ctx.setLineDash([])}
  // CSI300
  if(csiPts.length>1){ctx.strokeStyle='#F59E0B';ctx.lineWidth=2;ctx.beginPath();csiPts.forEach((p,i)=>{const x=tx(i),y=ty(p.cumRet);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});ctx.stroke()}
  // Fund
  if(fundPts.length>1){
    ctx.strokeStyle='#3B82F6';ctx.lineWidth=2;ctx.beginPath();fundPts.forEach((p,i)=>{const x=tx(i),y=ty(p.cumRet);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});ctx.stroke();
    const grd=ctx.createLinearGradient(0,pad.top,0,H-pad.bottom);grd.addColorStop(0,'rgba(59,130,246,.12)');grd.addColorStop(1,'rgba(59,130,246,.01)');
    ctx.lineTo(tx(n-1),ty(min));ctx.lineTo(tx(0),ty(min));ctx.closePath();ctx.fillStyle=grd;ctx.fill()
  }
  ctx.fillStyle='#888';ctx.font='10px sans-serif';ctx.textAlign='center';
  if(n>1){const fd=fundPts[0]?.date||csiPts[0]?.date,ld=fundPts[n-1]?.date||csiPts[n-1]?.date;ctx.textAlign='left';ctx.fillText((fd.getMonth()+1)+'/'+fd.getDate(),pad.left,H-3);ctx.textAlign='right';ctx.fillText((ld.getMonth()+1)+'/'+ld.getDate(),W-pad.right,H-3)}
  ctx.textAlign='right';ctx.fillStyle='#666';ctx.font='9px sans-serif';
  ctx.fillText(max.toFixed(1)+'%',pad.left-4,pad.top+8);ctx.fillText(min.toFixed(1)+'%',pad.left-4,H-pad.bottom);
  // update legend and range label
  const rl=$('perf-range-label');
  if(rl){const labels={d7:'近7日',m1:'近1月',m3:'近3月',m6:'近6月',y1:'近1年',y3:'近3年'};rl.textContent=labels[range]||range;}
  const lf=$('perf-legend-fund'),lc=$('perf-legend-csi');
  const fundRangeRet=fundPts.length>1?fundPts[fundPts.length-1].cumRet:0;
  const csiRangeRet=csiPts.length>1?csiPts[csiPts.length-1].cumRet:0;
  if(lf){lf.textContent=fmtR(fundRangeRet);lf.style.color=fundRangeRet>=0?'var(--red)':'var(--green)'}
  if(lc){lc.textContent=fmtR(csiRangeRet);lc.style.color=csiRangeRet>=0?'var(--red)':'var(--green)'}
}

function drawKLineChart(range){
  range=range||'m3';
  const c=$('kline-chart');if(!c)return;
  const p=curParams(),sym=p.symbol||'';
  const snap=state.stockSnapshots.find(s=>s.symbol===sym);
  if(!snap)return;
  const data=state._klineCache[sym]||[];
  if(!data.length)return;
  const rect=c.parentElement.getBoundingClientRect();
  c.width=rect.width*2;c.height=rect.height*2;
  const ctx=c.getContext('2d');ctx.scale(2,2);
  const W=rect.width,H=rect.height;
  const leftInset=48,rightInset=14,topInset=20,bottomInset=28;
  const gap=12;
  const volRatio=0.22;
  const priceH=Math.max(100,(H-topInset-bottomInset-gap)*(1-volRatio));
  const volH=H-topInset-bottomInset-gap-priceH;
  const priceTop=topInset,priceBottom=priceTop+priceH;
  const volTop=priceBottom+gap,volBottom=volTop+volH;
  const cw=W-leftInset-rightInset;
  const count=SRANGES[range]||60;
  // data is newest-first, reverse so oldest at index 0
  const pts=[...data].reverse().slice(-count);
  const n=pts.length;
  if(!n)return;
  const maxP=Math.max(...pts.map(p=>p.high)),minP=Math.min(...pts.map(p=>p.low)),rng=maxP-minP||1;
  const xGap=cw/n,candleW=Math.min(xGap*.72,14);
  const tx=i=>leftInset+i*xGap+xGap/2;
  const tyPrice=v=>priceTop+priceH-((v-minP)/rng)*priceH;
  const maxVol=Math.max(...pts.map(p=>p.volume||0),1);
  const tyVol=v=>volBottom-((v/maxVol)*volH);
  ctx.clearRect(0,0,W,H);
  // price grid lines
  ctx.strokeStyle='rgba(255,255,255,.04)';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){const y=priceTop+(priceH/4)*i;ctx.beginPath();ctx.moveTo(leftInset,y);ctx.lineTo(W-rightInset,y);ctx.stroke()}
  // volume baseline
  ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=0.5;
  ctx.beginPath();ctx.moveTo(leftInset,volBottom);ctx.lineTo(W-rightInset,volBottom);ctx.stroke();
  // candles + volume bars
  pts.forEach((pt,i)=>{
    const x=tx(i),o=pt.open,c=pt.close,h=pt.high,l=pt.low,up=c>=o;
    const color=up?'#EF4444':'#22C55E';
    // wick
    ctx.strokeStyle=color;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x,tyPrice(h));ctx.lineTo(x,tyPrice(l));ctx.stroke();
    // body
    const bt=Math.min(o,c),bb=Math.max(o,c),bh=Math.max((bb-bt)/rng*priceH,1);
    ctx.fillStyle=color;ctx.fillRect(x-candleW/2,tyPrice(bb),candleW,bh);
    // volume bar (semi-transparent)
    const vol=pt.volume||0;
    if(vol>0){
      const vh=Math.max(1,tyVol(0)-tyVol(vol));
      ctx.fillStyle=up?'rgba(239,68,68,.22)':'rgba(34,197,94,.22)';
      ctx.fillRect(x-candleW/2,tyVol(vol),candleW,vh);
    }
  });
  // price labels — 6 evenly spaced values
  ctx.fillStyle='#888';ctx.font='10px sans-serif';ctx.textAlign='right';
  for(let i=0;i<=5;i++){const v=minP+(rng/5)*i;ctx.fillText(v.toFixed(2),leftInset-4,tyPrice(v)+4)}
  // date labels on x-axis — 5 evenly spaced points
  ctx.textAlign='center';ctx.fillStyle='#555';ctx.font='9px sans-serif';
  if(n>1){
    const steps=[0,Math.floor(n/4),Math.floor(n/2),Math.floor(3*n/4),n-1];
    steps.forEach(idx=>{
      if(idx>=n)return;
      const d=pts[idx].date;
      ctx.fillText(d.slice(5),leftInset+idx*xGap+xGap/2,H-4);
    });
  }
  // update range label
  const rl=$('kline-range-label');if(rl){
    const labels={d7:'近7日',m1:'近1月',m3:'近3月',m6:'近6月',y1:'近1年',y3:'近3年'};
    rl.textContent=labels[range]||range;
  }
}

// ===== Refresh Logic =====
async function concurrentBatch(items,fn,concurrency=5){
  const results=[],queue=[...items];
  const workers=Array(concurrency).fill().map(async()=>{while(queue.length){const item=queue.shift();try{results.push(await fn(item))}catch(e){results.push({_error:e,_item:item})}}});
  await Promise.all(workers);return results;
}

async function refreshFunds(){
  state.lastFundRef=Date.now();
  const codes=state.funds.map(f=>f.fundCode);
  if(!codes.length){state.fundSnapshots=[];state.fundSummary=null;if(state.page==='dashboard')render();return}
  const results=await concurrentBatch(codes,async code=>{
    const cfg=state.funds.find(f=>f.fundCode===code);if(!cfg)return null;
    const [val,trend,latest]=await Promise.all([api.fundValuation(code).catch(()=>null),api.fundNavTrend(code).catch(()=>null),api.fundNavLatest(code).catch(()=>null)]);
    const name=val?.name||trend?.name||cfg.fundName||code;
    const gsz=val?parseFloat(val.gsz):null,gszzl=val?parseFloat(val.gszzl):null,dwjz=val?parseFloat(val.dwjz):null;
    const jzrq=val?.jzrq||'',gztime=val?.gztime||'';
    const trendData=trend?.netWorthTrend||[],latestItems=latest?.items||[];
    const merged=mergeNavPair(trendData,latestItems);
    const latestNav=merged.nav||dwjz||null,prevNav=merged.prevNav||null,navDate=merged.navDate||jzrq;
    const marketOpen=isMarketOpen(),hasTodayNav=navDate===new Date().toISOString().split('T')[0];
    let cp,tb,cl,tr;
    if(marketOpen&&gsz!=null){cp=gsz;tb=latestNav??dwjz??gsz;cl='估值';tr=gszzl??((cp-tb)/tb*100)}
    else if(!marketOpen&&hasTodayNav&&latestNav!=null&&prevNav!=null){cp=latestNav;tb=prevNav;cl='净值';tr=(cp-tb)/tb*100}
    else if(!marketOpen&&gsz!=null){cp=gsz;tb=dwjz??gsz;cl='估值';tr=gszzl??((cp-tb)/tb*100)}
    else{cp=latestNav??gsz??null;tb=prevNav??dwjz??cp;cl=latestNav!=null?'净值':'估值';tr=cp&&tb?(cp-tb)/tb*100:0}
    const costPrice=cfg.costPrice,shares=cfg.shares;
    return{code,name:cfg.fundName||name,fundName:cfg.fundName||name,costPrice,shares,currentPrice:cp,currentPriceLabel:cl,latestPublishedNav:latestNav,previousNav:prevNav,dataDate:navDate,valuationTime:gztime,todayProfit:cp!=null&&tb!=null?(cp-tb)*shares:null,todayRate:tr,cumulativeProfit:cp!=null?(cp-costPrice)*shares:null,cumulativeRate:costPrice>0&&cp!=null?(cp-costPrice)/costPrice*100:null,holdValue:cp!=null?cp*shares:costPrice*shares,hasTodayNav};
  },5);
  const snaps=results.filter(r=>r&&!r._error);
  if(snaps.length>0||!state.demo){
    if(snaps.length>0){
      state.fundSnapshots=snaps;
      let tc=0,ttp=0,tcp=0,thv=0;
      for(const s of snaps){tc+=s.costPrice*s.shares;ttp+=s.todayProfit||0;tcp+=s.cumulativeProfit||0;thv+=s.holdValue}
      state.fundSummary={totalCost:tc,totalTodayProfit:ttp,totalCumulativeProfit:tcp,totalHoldValue:thv};
    }
  } else {
    // Demo fallback: create basic snapshots from sample data when API unavailable
    const demosnaps=state.funds.map(f=>({code:f.fundCode,name:f.fundName||f.fundCode,fundName:f.fundName||f.fundCode,costPrice:f.costPrice,shares:f.shares,currentPrice:null,currentPriceLabel:'--',latestPublishedNav:null,previousNav:null,dataDate:'',valuationTime:'',todayProfit:null,todayRate:null,cumulativeProfit:null,cumulativeRate:null,holdValue:f.costPrice*f.shares,hasTodayNav:false}));
    state.fundSnapshots=demosnaps;
    let tc=0;for(const s of demosnaps)tc+=s.costPrice*s.shares;
    state.fundSummary={totalCost:tc,totalTodayProfit:0,totalCumulativeProfit:0,totalHoldValue:tc};
  }
  if(state.page==='dashboard')render();
}

async function refreshStocks(){
  state.lastStockRef=Date.now();
  const symbols=state.stocks.map(s=>s.symbol);
  if(!symbols.length){state.stockSnapshots=[];state.stockSummary=null;if(state.page==='dashboard')render();return}
  const results=await concurrentBatch(symbols,async symbol=>{
    const cfg=state.stocks.find(s=>s.symbol===symbol);if(!cfg)return null;
    const q=await api.stockQuote(symbol);
    const price=q.regularPrice||0,prevClose=q.previousClose||0,change=price-prevClose,changePct=prevClose>0?change/prevClose*100:0;
    return{symbol,name:q.name||cfg.displayName||symbol,displayName:cfg.displayName||symbol,averageCost:cfg.averageCost,shares:cfg.shares,regularPrice:price,previousClose:prevClose,todayChange:change,todayChangePercent:changePct,todayProfit:change*cfg.shares,marketValue:price*cfg.shares,totalCost:cfg.averageCost*cfg.shares,holdingProfit:price*cfg.shares-cfg.averageCost*cfg.shares,holdingProfitPercent:cfg.averageCost*cfg.shares>0?(price*cfg.shares-cfg.averageCost*cfg.shares)/(cfg.averageCost*cfg.shares)*100:0,marketState:q.marketState||'closed'};
  },5);
  const snaps=results.filter(r=>r&&!r._error);
  if(snaps.length>0||!state.demo){
    if(snaps.length>0){
      state.stockSnapshots=snaps;
      let tc=0,tmv=0,tt=0,th=0;
      for(const s of snaps){tc+=s.totalCost;tmv+=s.marketValue;tt+=s.todayProfit||0;th+=s.holdingProfit}
      state.stockSummary={totalCost:tc,totalMarketValue:tmv,totalTodayProfit:tt,totalHoldingProfit:th,marketState:snaps[0]?.marketState||'closed'};
    }
  } else {
    // Demo fallback: create basic snapshots from sample data when API unavailable
    const demosnaps=state.stocks.map(s=>({symbol:s.symbol,name:s.displayName||s.symbol,displayName:s.displayName||s.symbol,averageCost:s.averageCost,shares:s.shares,regularPrice:null,previousClose:null,todayChange:null,todayChangePercent:null,todayProfit:null,marketValue:s.averageCost*s.shares,totalCost:s.averageCost*s.shares,holdingProfit:null,holdingProfitPercent:null,marketState:'closed'}));
    state.stockSnapshots=demosnaps;
    let tc=0;for(const s of demosnaps)tc+=s.totalCost;
    state.stockSummary={totalCost:tc,totalMarketValue:tc,totalTodayProfit:0,totalHoldingProfit:0,marketState:'closed'};
  }
  if(state.page==='dashboard')render();
}

async function refreshAll(){await refreshFunds();await refreshStocks()}

// Optimistic dashboard loader — funds & stocks load in parallel, each renders as it arrives
async function loadDashboardData(){
  const onDone=()=>{
    if(state.loading){state.loading=false;if(state.page==='dashboard')render()}
    scheduleRef();
  };
  let fDone=false,sDone=false;
  const tryDone=()=>{if(fDone||sDone)onDone()};
  Promise.all([
    refreshFunds().then(()=>{fDone=true;tryDone()}).catch(()=>{fDone=true;tryDone()}),
    refreshStocks().then(()=>{sDone=true;tryDone()}).catch(()=>{sDone=true;tryDone()})
  ]);
}

// ===== Auto Refresh =====
let refTimer=null;
function scheduleRef(){
  clearInterval(refTimer);
  refTimer=setInterval(refreshAll,state.tab==='fund'?FUND_REF_MS:STOCK_REF_MS);
}

// ===== Init =====
async function init(){
  const token=localStorage.getItem(TOKEN_KEY);
  if(token){
    try{
      state.user=await api.me();
      state.loading=true;
      navigate('dashboard');
      await bootstrapPortfolio();
      loadDashboardData();
    }catch(e){localStorage.removeItem(TOKEN_KEY);navigate('login')}
  }else{
    // DEMO MODE — show sample data without login
    state.demo=true;
    state.funds=[{...SAMPLE_FUNDS[0]}];
    state.stocks=[{...SAMPLE_STOCKS[0]}];
    saveFunds();saveStocks();
    navigate('dashboard');
    // Try fetching real quotes for sample holdings (best-effort)
    try{await refreshFunds()}catch(e){}
    try{await refreshStocks()}catch(e){}
  }

  document.addEventListener('visibilitychange',()=>{if(!document.hidden&&state.user)refreshAll()});

  // Keyboard shortcuts
  document.addEventListener('keydown',e=>{
    if(e.target?.tagName==='INPUT'||e.target?.tagName==='TEXTAREA')return;
    if(e.key==='n'||e.key==='N'){if(state.page==='dashboard'){if(state.tab==='fund')openFundEditor(null);else openStockEditor(null)}}
    if(e.key==='r'||e.key==='R'){refreshAll();toast('刷新中…','success')}
  });
}

document.addEventListener('DOMContentLoaded',init);
</script>
